<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="quiz-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="question-text">
                <h1></h1>
            </div>
        </div>
        <div class="quiz-container">
            <div class="chain">
                <img src="image/Chain.png" alt="" class="chain1">
                <img src="image/Chain.png" alt="" class="chain2">
            </div>
            <div class="light">
                <img src="image/Light.png" alt="" class="light1">
                <img src="image/Light.png" alt="" class="light2">
            </div>
            <div class="scale">
                <input type="radio" name="question1" id="q1-agree-7" value="2">
                <label for="q1-agree-7" class="radio-label"></label>
                <input type="radio" name="question1" id="q1-agree-6" value="1">
                <label for="q1-agree-6" class="radio-label"></label>
                <input type="radio" name="question1" id="q1-agree-5" value="0.5">
                <label for="q1-agree-5" class="radio-label"></label>
                <input type="radio" name="question1" id="q1-agree-4" value="0">
                <label for="q1-agree-4" class="radio-label"></label>
                <input type="radio" name="question1" id="q1-agree-3" value="-0.5">
                <label for="q1-agree-3" class="radio-label"></label>
                <input type="radio" name="question1" id="q1-agree-2" value="-1">
                <label for="q1-agree-2" class="radio-label"></label>
                <input type="radio" name="question1" id="q1-agree-1" value="-2">
                <label for="q1-agree-1" class="radio-label"></label>
            </div>                
        </div>
        <div class="navigation">
            <button id="next-button">หน้าถัดไป</button>
        </div>
    </div>  
    <div class="background">
        <img src="image/QuizBG.png" alt="">
    </div>
    <script src="quiz-script.js"></script>
</body>
</html>
